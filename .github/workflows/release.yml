name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          version: 4.6.1
          use-dotnet: false

      - name: Verify Godot Version
        run: godot --version

      - name: Build Export Targets
        run: |
          mkdir -p build/windows build/linux build/web dist
          godot --headless --path . --export-release "Windows Desktop" build/windows/NeonBoroughs.exe
          godot --headless --path . --export-release "Linux/BSD" build/linux/NeonBoroughs.x86_64
          godot --headless --path . --export-release "Web" build/web/index.html

      - name: Package Artifacts
        run: |
          zip -r dist/neon-boroughs-windows.zip build/windows
          tar -czf dist/neon-boroughs-linux.tar.gz -C build linux
          zip -r dist/neon-boroughs-web.zip build/web
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neon-boroughs-release
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/neon-boroughs-windows.zip
            dist/neon-boroughs-linux.tar.gz
            dist/neon-boroughs-web.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true