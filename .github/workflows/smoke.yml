name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          version: 4.6.1
          use-dotnet: false

      - name: Verify Godot Version
        run: godot --version

      - name: Run Headless Project Load
        run: godot --headless --path . --quit

      - name: Run Smoke Harness
        run: godot --headless --path . --script res://scripts/smoke_harness.gd
