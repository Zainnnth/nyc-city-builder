name: Scenario Balance Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  scenario-balance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          version: 4.6.1
          use-dotnet: false

      - name: Verify Godot Version
        run: godot --version

      - name: Run Scenario Balance Target Gate
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools/dev/run_scenario_balance.ps1 -GodotExe godot -Steps 180 -Seeds 1995,1998,2001,2004,2008 -EnforceTargets

      - name: Upload Scenario Balance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-balance-report
          path: tools/dev/benchmarks/scenario_balance_report.json
